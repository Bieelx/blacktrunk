# Supabase free tier pausa o projeto após 7 dias sem requisições.
# Este cron faz 1 query trivial por dia → projeto nunca dorme.
name: keep-supabase-alive

on:
  schedule:
    - cron: '0 12 * * *' # todo dia 12:00 UTC
  workflow_dispatch: {} # permite rodar manual pra testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            "${{ secrets.SUPABASE_URL }}/rest/v1/users?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            > /dev/null
